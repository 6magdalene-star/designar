<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DesignAR – Wnętrza & Ogrody</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#f5f0e8; --sage:#7a9e7e; --sage-dark:#4a6741;
  --terra:#c4774a; --charcoal:#2a2520; --white:#fdfaf6;
  --glass:rgba(253,250,246,0.13); --gb:rgba(253,250,246,0.22);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--charcoal);font-family:'DM Sans',sans-serif;color:var(--white);user-select:none;}

/* WELCOME */
#welcome{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(160deg,#1a1510 0%,#2a2018 60%,#1a1f10 100%);padding:24px;}
.wlogo{font-family:'Cormorant Garamond',serif;font-size:38px;font-weight:300;letter-spacing:.1em;}
.wlogo span{color:var(--sage);font-weight:600;}
.wsub{font-size:13px;color:rgba(253,250,246,.4);text-align:center;line-height:1.6;}
.wbtns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px;margin-top:8px;}
.wb{padding:14px;border-radius:14px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .25s;}
.wp{background:var(--sage);color:#fff;box-shadow:0 4px 20px rgba(122,158,126,.35);}
.wp:active{background:var(--sage-dark);}
.ws{background:var(--glass);color:var(--cream);border:1px solid var(--gb);backdrop-filter:blur(10px);}
.ws:active{background:rgba(122,158,126,.2);}

/* APP */
#app{position:fixed;inset:0;display:none;flex-direction:column;}

/* CANVAS AREA */
#cw{position:relative;flex:1;overflow:hidden;background:#0e0c0a;display:flex;align-items:center;justify-content:center;}
#bgC,#tC,#oC{position:absolute;inset:0;width:100%;height:100%;}
#tC{pointer-events:none;opacity:0;transition:opacity .4s;}
#oC{touch-action:none;}

/* no photo */
#noph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;pointer-events:none;}
.noph-icon{font-size:52px;opacity:.3;}
.noph-txt{font-size:13px;color:rgba(253,250,246,.3);text-align:center;}

/* TOP BAR */
#tb{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:linear-gradient(to bottom,rgba(14,12,10,.92) 0%,transparent 100%);pointer-events:none;}
#tb>*{pointer-events:auto;}
.logo{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;letter-spacing:.08em;}
.logo span{color:var(--sage);font-weight:600;}
.mtog{display:flex;gap:3px;background:rgba(0,0,0,.45);border:1px solid var(--gb);border-radius:100px;padding:3px;backdrop-filter:blur(10px);}
.mb{padding:5px 13px;border-radius:100px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;background:transparent;color:rgba(253,250,246,.5);transition:all .25s;}
.mb.active{background:var(--sage);color:#fff;}
.pb{padding:6px 11px;border-radius:100px;border:1px solid var(--gb);background:rgba(0,0,0,.55);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;gap:4px;}
.pb:active{background:rgba(122,158,126,.3);}

/* SAVE BTN */
#saveBtn{position:absolute;bottom:8px;right:10px;z-index:25;padding:6px 12px;border-radius:100px;border:1px solid var(--gb);background:rgba(0,0,0,.6);color:var(--cream);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;backdrop-filter:blur(10px);display:flex;align-items:center;gap:4px;}
#saveBtn:active{background:rgba(122,158,126,.3);}

/* INDICATOR */
#ind{position:absolute;top:52px;left:50%;transform:translateX(-50%);background:rgba(122,158,126,.92);border-radius:100px;padding:6px 14px;font-size:12px;color:#fff;z-index:25;display:none;align-items:center;gap:5px;backdrop-filter:blur(8px);white-space:nowrap;}
#ind.on{display:flex;}

/* ERASE RECT */
#er{position:absolute;border:2px dashed var(--terra);background:rgba(196,119,74,.1);border-radius:3px;pointer-events:none;display:none;z-index:10;}

/* OBJ CONTROLS */
#oc{position:absolute;z-index:30;display:none;flex-direction:row;gap:2px;padding:4px;background:rgba(14,12,10,.93);border:1px solid var(--gb);border-radius:12px;backdrop-filter:blur(12px);}
#oc.on{display:flex;}
.ocb{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.ocb:active{background:rgba(122,158,126,.35);}
.ocr:active{background:rgba(196,119,74,.35);}

/* TOAST */
#toast{position:absolute;bottom:calc(44vh + 14px);left:50%;transform:translateX(-50%) translateY(8px);background:rgba(14,12,10,.95);border:1px solid var(--sage);border-radius:10px;padding:8px 16px;font-size:12px;color:var(--cream);z-index:50;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;backdrop-filter:blur(10px);}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* BOTTOM PANEL */
#bp{background:rgba(18,14,11,.98);border-top:1px solid rgba(253,250,246,.07);z-index:20;display:flex;flex-direction:column;height:44vh;min-height:200px;max-height:360px;}
.trow{display:flex;gap:4px;padding:7px 10px 3px;overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.trow::-webkit-scrollbar{display:none;}
.tc{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:6px 11px;border-radius:100px;border:1px solid rgba(253,250,246,.11);background:rgba(253,250,246,.05);color:rgba(253,250,246,.6);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tc.active{background:rgba(122,158,126,.25);border-color:var(--sage);color:#fff;}
.tc:active{transform:scale(.95);}
.tabrow{display:flex;padding:0 10px;gap:2px;flex-shrink:0;border-bottom:1px solid rgba(253,250,246,.06);}
.tab{flex:1;padding:6px 2px;text-align:center;font-size:11px;font-family:'DM Sans',sans-serif;color:rgba(253,250,246,.38);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--sage);border-bottom-color:var(--sage);}
.iscroll{overflow-y:auto;flex:1;scrollbar-width:none;padding:6px 8px 8px;}
.iscroll::-webkit-scrollbar{display:none;}
.igrid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;}
.ib{aspect-ratio:1;border-radius:10px;border:1px solid rgba(253,250,246,.09);background:rgba(253,250,246,.04);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;font-size:23px;transition:all .18s;}
.ib span{font-size:9px;color:rgba(253,250,246,.42);font-family:'DM Sans',sans-serif;text-align:center;line-height:1.1;}
.ib.sel{background:rgba(122,158,126,.22);border-color:var(--sage);}
.ib:active{transform:scale(.9);}
.cgrid{display:flex;flex-wrap:wrap;gap:7px;padding:8px 10px;}
.cd{width:34px;height:34px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;flex-shrink:0;}
.cd.sel{border-color:#fff;box-shadow:0 0 0 2px var(--sage);transform:scale(1.1);}
.slsec{padding:6px 14px 10px;}
.sll{font-size:11px;color:rgba(253,250,246,.42);display:flex;justify-content:space-between;margin-bottom:5px;}
input[type=range]{-webkit-appearance:none;width:100%;height:3px;background:rgba(253,250,246,.14);border-radius:10px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;background:var(--sage);cursor:pointer;}
.hint{padding:14px;text-align:center;color:rgba(253,250,246,.32);font-size:12px;line-height:1.5;}
#fileInput{display:none;}
</style>
</head>
<body>

<!-- WELCOME SCREEN -->
<div id="welcome">
  <div class="wlogo">Design<span>AR</span></div>
  <div class="wsub">Zrób zdjęcie swojego pokoju lub ogrodu<br>i projektuj w czasie rzeczywistym</div>
  <div class="wbtns">
    <button class="wb wp" onclick="triggerPhoto('camera')">📷 Zrób zdjęcie teraz</button>
    <button class="wb ws" onclick="triggerPhoto('gallery')">🖼️ Wybierz z galerii</button>
    <button class="wb ws" onclick="startApp()">✏️ Zacznij bez zdjęcia</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div id="cw">
    <canvas id="bgC"></canvas>
    <canvas id="tC"></canvas>
    <canvas id="oC"></canvas>
    <div id="er"></div>

    <div id="noph">
      <div class="noph-icon">📷</div>
      <div class="noph-txt">Dotknij „Nowe zdjęcie" aby załadować<br>zdjęcie pokoju lub ogrodu</div>
    </div>

    <!-- Top bar -->
    <div id="tb">
      <div class="logo">Design<span>AR</span></div>
      <div class="mtog">
        <button class="mb active" onclick="setMode('interior')">🏠 Wnętrze</button>
        <button class="mb" onclick="setMode('garden')">🌿 Ogród</button>
      </div>
      <button class="pb" onclick="triggerPhoto('camera')">📷 Nowe zdjęcie</button>
    </div>

    <!-- Selected item indicator -->
    <div id="ind">
      <span id="indE"></span><span id="indL"></span>
      <span style="opacity:.55;font-size:10px;">→ dotknij zdjęcie</span>
    </div>

    <!-- Object controls -->
    <div id="oc">
      <button class="ocb" onclick="rotO(-20)">↺</button>
      <button class="ocb" onclick="rotO(20)">↻</button>
      <button class="ocb" onclick="sclO(1.15)">＋</button>
      <button class="ocb" onclick="sclO(0.87)">－</button>
      <button class="ocb ocr" onclick="delO()">✕</button>
    </div>

    <!-- Save button -->
    <button id="saveBtn" onclick="screenshot()">📸 Zapisz</button>

    <!-- Toast -->
    <div id="toast"></div>
  </div>

  <!-- BOTTOM PANEL -->
  <div id="bp">
    <div class="trow" id="trow"></div>
    <div class="tabrow" id="tabrow"></div>
    <div class="iscroll" id="iscroll"></div>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" capture="environment">

<script>
// ── DATA ──────────────────────────────────────
const INT_TABS = {
  'Meble':[
    {e:'🛋️',l:'Sofa'},{e:'🪑',l:'Fotel'},{e:'🛏️',l:'Łóżko'},
    {e:'📺',l:'TV'},{e:'💡',l:'Lampa'},{e:'🪴',l:'Roślina'},
    {e:'🖼️',l:'Obraz'},{e:'🪞',l:'Lustro'},{e:'🛁',l:'Wanna'},
    {e:'🚿',l:'Prysznic'},{e:'🍳',l:'Kuchnia'},{e:'🚪',l:'Drzwi'},
    {e:'📚',l:'Regał'},{e:'🪣',l:'Kosz'},{e:'🛺',l:'Szafka'},
  ],
  'Dekor':[
    {e:'🕯️',l:'Świeca'},{e:'🏺',l:'Wazon'},{e:'⏰',l:'Zegar'},
    {e:'🧸',l:'Maskotka'},{e:'🪆',l:'Figurka'},{e:'🌵',l:'Kaktus'},
    {e:'🍃',l:'Liście'},{e:'🧺',l:'Koszyk'},{e:'📿',l:'Girlanda'},
    {e:'🎨',l:'Obraz'},{e:'🌿',l:'Gałązka'},{e:'🎍',l:'Bambus'},
  ],
};
const GAR_TABS = {
  'Rośliny':[
    {e:'🌹',l:'Róże'},{e:'🌷',l:'Tulipany'},{e:'🌻',l:'Słoneczniki'},
    {e:'🌺',l:'Kwiaty'},{e:'🌸',l:'Wiśnie'},{e:'🪻',l:'Lawenda'},
    {e:'🌳',l:'Drzewo'},{e:'🌲',l:'Świerk'},{e:'🎋',l:'Bambus'},
    {e:'🌿',l:'Trawa'},{e:'🍀',l:'Koniczyna'},{e:'🌾',l:'Trawy ozd.'},
  ],
  'Architektura':[
    {e:'⛲',l:'Fontanna'},{e:'🏡',l:'Altana'},{e:'🚪',l:'Brama'},
    {e:'🪨',l:'Kamienie'},{e:'🧱',l:'Murki'},{e:'🪵',l:'Płot'},
    {e:'⛺',l:'Pergola'},{e:'🏊',l:'Oczko'},{e:'🛤️',l:'Ścieżka'},
  ],
  'Dekoracje':[
    {e:'🪔',l:'Latarnia'},{e:'🏮',l:'Lampion'},{e:'🪑',l:'Ławka'},
    {e:'🫧',l:'Wodospad'},{e:'🪆',l:'Figurka'},{e:'⛱️',l:'Parasol'},
    {e:'🔔',l:'Dzwonek'},{e:'🌡️',l:'Termometr'},{e:'🎑',l:'Ornament'},
  ],
};
const WCOLS = [
  {c:'#f5f0e8',l:'Krem'},{c:'#e8ddd0',l:'Beż'},{c:'#d4c5b0',l:'Piasek'},
  {c:'#b8d4c8',l:'Mięta'},{c:'#8fb8a8',l:'Szałwia'},{c:'#6a9e8a',l:'Zieleń'},
  {c:'#c8d4e8',l:'Błękit'},{c:'#9ab0cc',l:'Niebieski'},{c:'#7090b8',l:'Granat'},
  {c:'#e8c8c8',l:'Różowy'},{c:'#d4a0a0',l:'Łosoś'},{c:'#b87878',l:'Ceglasty'},
  {c:'#e8e0c8',l:'Słomka'},{c:'#d4c890',l:'Złoty'},{c:'#b8a850',l:'Oliwka'},
  {c:'#e0c8e8',l:'Liliowy'},{c:'#c8a0d4',l:'Fiolet'},{c:'#a870c0',l:'Śliwka'},
  {c:'#2a2520',l:'Grafit'},{c:'#555050',l:'Ciemny'},{c:'#ffffff',l:'Biel'},
];
const GCOLS = [
  {c:'#4a7c3f',l:'Trawa'},{c:'#6a9e5a',l:'Zieleń'},{c:'#8abf70',l:'Łąka'},
  {c:'#8b7355',l:'Ziemia'},{c:'#6b5a3a',l:'Gleba'},{c:'#a08060',l:'Piach'},
  {c:'#c8b878',l:'Słoma'},{c:'#9090a0',l:'Kamień'},{c:'#707080',l:'Beton'},
];

// ── STATE ─────────────────────────────────────
let mode='interior', tool='place';
let bgImg=null, bgOff={x:0,y:0,w:0,h:0};
let objs=[], selObj=null, selItem=null;
let wallCol=null, wallOp=0.35;

// touch state
let dragObj=null,dox=0,doy=0,pStart=null,didDrag=false;
let erasing=false,erP1=null;

// ── CANVASES ──────────────────────────────────
const bgC=document.getElementById('bgC'), bgX=bgC.getContext('2d');
const tC=document.getElementById('tC'),  tX=tC.getContext('2d');
const oC=document.getElementById('oC'),  oX=oC.getContext('2d');
const cw=document.getElementById('cw');

function resize(){
  const W=cw.clientWidth,H=cw.clientHeight;
  [bgC,tC,oC].forEach(c=>{c.width=W;c.height=H;});
  drawBg(); drawTint(); drawObjs();
}
window.addEventListener('resize',resize);

function drawBg(){
  const W=bgC.width,H=bgC.height;
  bgX.clearRect(0,0,W,H);
  if(!bgImg)return;
  const s=Math.min(W/bgImg.naturalWidth,H/bgImg.naturalHeight);
  const dw=bgImg.naturalWidth*s,dh=bgImg.naturalHeight*s;
  bgOff={x:(W-dw)/2,y:(H-dh)/2,w:dw,h:dh};
  bgX.drawImage(bgImg,bgOff.x,bgOff.y,dw,dh);
}
function drawTint(){
  const W=tC.width,H=tC.height;
  tX.clearRect(0,0,W,H);
  if(!wallCol){tC.style.opacity=0;return;}
  tX.fillStyle=wallCol; tX.fillRect(0,0,W,H);
  tC.style.opacity=wallOp;
}
function drawObjs(){
  const W=oC.width,H=oC.height;
  oX.clearRect(0,0,W,H);
  objs.forEach(o=>{
    oX.save();
    oX.translate(o.x,o.y);
    oX.rotate(o.rot*Math.PI/180);
    oX.scale(o.sc,o.sc);
    oX.shadowColor='rgba(0,0,0,0.5)';
    oX.shadowBlur=16;
    oX.shadowOffsetY=7;
    oX.font='56px serif';
    oX.textAlign='center';
    oX.textBaseline='middle';
    oX.fillText(o.e,0,0);
    if(o===selObj){
      oX.shadowBlur=0;
      oX.strokeStyle='rgba(122,158,126,1)';
      oX.lineWidth=2.5/o.sc;
      oX.setLineDash([5,3]);
      oX.strokeRect(-38,-38,76,76);
      oX.setLineDash([]);
    }
    oX.restore();
  });
}

// ── PHOTO ─────────────────────────────────────
function triggerPhoto(src){
  const fi=document.getElementById('fileInput');
  if(src==='camera') fi.setAttribute('capture','environment');
  else fi.removeAttribute('capture');
  fi.click();
}
document.getElementById('fileInput').addEventListener('change',function(e){
  const f=e.target.files[0]; if(!f)return;
  const url=URL.createObjectURL(f);
  const img=new Image();
  img.onload=()=>{
    bgImg=img;
    document.getElementById('noph').style.display='none';
    startApp();
    setTimeout(resize,50);
    toast('✅ Zdjęcie załadowane! Wybierz mebel i dotknij zdjęcie.');
  };
  img.src=url; e.target.value='';
});

function startApp(){
  document.getElementById('welcome').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex';
  app.style.flexDirection='column';
  buildPanel();
  setupTouch();
  setTimeout(resize,30);
}

// ── PANEL ─────────────────────────────────────
const INT_TOOLS=[
  {id:'place',ic:'➕',lb:'Dodaj mebel'},
  {id:'move', ic:'✋',lb:'Przesuń'},
  {id:'paint',ic:'🎨',lb:'Kolor ściany'},
  {id:'erase',ic:'🪄',lb:'Ukryj mebel'},
  {id:'delete',ic:'🗑️',lb:'Usuń'},
];
const GAR_TOOLS=[
  {id:'place',ic:'➕',lb:'Dodaj element'},
  {id:'move', ic:'✋',lb:'Przesuń'},
  {id:'paint',ic:'🌱',lb:'Kolor podłoża'},
  {id:'delete',ic:'🗑️',lb:'Usuń'},
];

function buildPanel(){ buildTools(); buildContent(); }

function buildTools(){
  const row=document.getElementById('trow');
  row.innerHTML='';
  (mode==='interior'?INT_TOOLS:GAR_TOOLS).forEach(t=>{
    const b=document.createElement('button');
    b.className='tc'+(t.id===tool?' active':'');
    b.innerHTML=t.ic+' '+t.lb;
    b.onclick=()=>setTool(t.id);
    row.appendChild(b);
  });
}

function buildContent(){
  const tabs=mode==='interior'?INT_TABS:GAR_TABS;
  const tabrow=document.getElementById('tabrow');
  const scroll=document.getElementById('iscroll');
  tabrow.innerHTML=''; scroll.innerHTML='';

  if(tool==='paint'){
    tabrow.style.display='none';
    buildColors(scroll);
    return;
  }
  if(tool==='move'||tool==='delete'||tool==='erase'){
    tabrow.style.display='none';
    scroll.innerHTML=`<div class="hint">${
      tool==='move'?'Dotknij element na zdjęciu i przeciągnij go w nowe miejsce.':
      tool==='delete'?'Dotknij element na zdjęciu aby go usunąć.':
      'Przeciągnij palcem na zdjęciu aby ukryć prawdziwy mebel.\nNastępnie wstaw wirtualny mebel na to miejsce.'
    }</div>`;
    return;
  }

  tabrow.style.display='flex';
  const names=Object.keys(tabs);
  names.forEach((n,i)=>{
    const b=document.createElement('button');
    b.className='tab'+(i===0?' active':'');
    b.textContent=n;
    b.onclick=()=>{
      document.querySelectorAll('.tab').forEach((t,j)=>t.classList.toggle('active',j===i));
      buildGrid(scroll,tabs[names[i]]);
    };
    tabrow.appendChild(b);
  });
  buildGrid(scroll,tabs[names[0]]);
}

function buildGrid(container,items){
  container.innerHTML='';
  const g=document.createElement('div');
  g.className='igrid';
  items.forEach(item=>{
    const b=document.createElement('div');
    b.className='ib'+(selItem&&selItem.e===item.e?' sel':'');
    b.innerHTML=item.e+'<span>'+item.l+'</span>';
    b.onclick=()=>pickItem(item);
    g.appendChild(b);
  });
  container.appendChild(g);
}

function buildColors(container){
  const cols=mode==='interior'?WCOLS:GCOLS;
  container.innerHTML='';
  const g=document.createElement('div');
  g.className='cgrid';
  cols.forEach(({c,l})=>{
    const d=document.createElement('div');
    d.className='cd'+(wallCol===c?' sel':'');
    d.style.background=c; d.title=l;
    d.onclick=()=>{
      wallCol=c; wallOp=parseFloat(document.getElementById('opSl')?.value||35)/100;
      container.querySelectorAll('.cd').forEach(x=>x.classList.remove('sel'));
      d.classList.add('sel');
      drawTint(); toast('🎨 '+l);
    };
    g.appendChild(d);
  });
  container.appendChild(g);

  const s=document.createElement('div');
  s.className='slsec';
  s.innerHTML=`<div class="sll"><span>Intensywność</span><span id="opVal">${Math.round(wallOp*100)}%</span></div>
  <input type="range" id="opSl" min="5" max="85" value="${Math.round(wallOp*100)}">
  <div style="margin-top:8px;display:flex;gap:6px;">
    <button onclick="wallCol=null;drawTint();toast('Kolor usunięty');" style="flex:1;padding:6px;border-radius:8px;border:1px solid rgba(253,250,246,.12);background:rgba(196,119,74,.12);color:var(--terra);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;">✕ Usuń kolor ściany</button>
  </div>`;
  container.appendChild(s);
  document.getElementById('opSl').oninput=function(){
    wallOp=this.value/100;
    document.getElementById('opVal').textContent=this.value+'%';
    drawTint();
  };
}

// ── TOOL / MODE / ITEM ────────────────────────
function setTool(t){
  tool=t; selItem=null; selObj=null;
  hideOC(); drawObjs();
  document.getElementById('ind').classList.remove('on');
  buildPanel();
}
function setMode(m){
  mode=m; tool='place'; selItem=null; selObj=null;
  wallCol=null; drawTint(); hideOC();
  document.querySelectorAll('.mb').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='interior')||(i===1&&m==='garden')));
  document.getElementById('ind').classList.remove('on');
  buildPanel();
  toast(m==='interior'?'🏠 Tryb wnętrza':'🌿 Tryb ogrodu');
}
function pickItem(item){
  selItem=item; tool='place';
  document.querySelectorAll('.ib').forEach(b=>b.classList.toggle('sel',b.textContent.includes(item.e)));
  document.getElementById('indE').textContent=item.e;
  document.getElementById('indL').textContent=item.l;
  document.getElementById('ind').classList.add('on');
  buildTools();
  toast(item.e+' '+item.l+' — dotknij zdjęcie aby umieścić');
}

// ── TOUCH ─────────────────────────────────────
function setupTouch(){
  oC.addEventListener('touchstart',tStart,{passive:false});
  oC.addEventListener('touchmove', tMove, {passive:false});
  oC.addEventListener('touchend',  tEnd,  {passive:false});
  oC.addEventListener('mousedown', e=>tStart({touches:[e],preventDefault:()=>{},stopPropagation:()=>{}}));
  oC.addEventListener('mousemove', e=>tMove({touches:[e],preventDefault:()=>{},stopPropagation:()=>{}}));
  oC.addEventListener('mouseup',   e=>tEnd({changedTouches:[e],preventDefault:()=>{},stopPropagation:()=>{}}));
}

function cpos(t){
  const r=oC.getBoundingClientRect();
  return{x:t.clientX-r.left,y:t.clientY-r.top};
}
function findO(x,y){
  for(let i=objs.length-1;i>=0;i--){
    const o=objs[i];
    if(Math.hypot(x-o.x,y-o.y)<42*o.sc) return o;
  }
  return null;
}

function tStart(e){
  e.preventDefault();
  const p=cpos(e.touches[0]);
  pStart=p; didDrag=false;

  if(tool==='erase'){
    erasing=true; erP1=p;
    const er=document.getElementById('er');
    er.style.cssText=`display:block;left:${p.x}px;top:${p.y}px;width:0;height:0;`;
    return;
  }

  const o=findO(p.x,p.y);
  if(o){
    if(tool==='delete'){
      objs=objs.filter(x=>x!==o);
      selObj=null; hideOC(); drawObjs();
      toast('🗑️ Usunięty');
    } else {
      dragObj=o; dox=p.x-o.x; doy=p.y-o.y;
      selObj=o; showOC(p.x,p.y); drawObjs();
    }
  }
}

function tMove(e){
  e.preventDefault();
  const p=cpos(e.touches[0]);
  if(pStart&&Math.hypot(p.x-pStart.x,p.y-pStart.y)>6) didDrag=true;

  if(erasing&&erP1){
    const x=Math.min(p.x,erP1.x),y=Math.min(p.y,erP1.y);
    const w=Math.abs(p.x-erP1.x),h=Math.abs(p.y-erP1.y);
    const er=document.getElementById('er');
    er.style.left=x+'px';er.style.top=y+'px';er.style.width=w+'px';er.style.height=h+'px';
    return;
  }
  if(dragObj){
    didDrag=true;
    dragObj.x=p.x-dox; dragObj.y=p.y-doy;
    showOC(p.x,p.y-75);
    drawObjs();
  }
}

function tEnd(e){
  e.preventDefault();
  const p=cpos(e.changedTouches[0]);

  if(erasing&&erP1){
    erasing=false;
    document.getElementById('er').style.display='none';
    const x=Math.min(p.x,erP1.x),y=Math.min(p.y,erP1.y);
    const w=Math.abs(p.x-erP1.x),h=Math.abs(p.y-erP1.y);
    erP1=null; dragObj=null;
    if(w>15&&h>15) doErase(x,y,w,h);
    else toast('Narysuj większy prostokąt na meblu');
    return;
  }

  dragObj=null;

  if(!didDrag){
    if(tool==='place'&&selItem){
      const o={e:selItem.e,l:selItem.l,x:p.x,y:p.y,sc:1,rot:0};
      objs.push(o); selObj=o;
      showOC(p.x,p.y-75); drawObjs();
      toast(selItem.e+' '+selItem.l+' dodany!');
    } else {
      const o=findO(p.x,p.y);
      if(o){selObj=o;showOC(p.x,p.y);drawObjs();}
      else{selObj=null;hideOC();drawObjs();}
    }
  }
  didDrag=false;
}

// ── OBJ CONTROLS ─────────────────────────────
function showOC(x,y){
  const oc=document.getElementById('oc');
  oc.classList.add('on');
  const W=cw.clientWidth,H=cw.clientHeight;
  oc.style.left=Math.max(8,Math.min(x-90,W-195))+'px';
  oc.style.top= Math.max(52,Math.min(y-50,H-55))+'px';
}
function hideOC(){document.getElementById('oc').classList.remove('on');}
function rotO(d){if(!selObj)return;selObj.rot=(selObj.rot+d)%360;drawObjs();}
function sclO(f){if(!selObj)return;selObj.sc=Math.max(.2,Math.min(4,selObj.sc*f));drawObjs();}
function delO(){if(!selObj)return;objs=objs.filter(o=>o!==selObj);selObj=null;hideOC();drawObjs();toast('🗑️ Usunięty');}

// ── ERASE ─────────────────────────────────────
function doErase(x,y,w,h){
  const fill=wallCol||'#c8bfae';
  bgX.fillStyle=fill; bgX.fillRect(x,y,w,h);
  bgX.strokeStyle='rgba(255,255,255,0.07)'; bgX.lineWidth=1;
  bgX.setLineDash([4,4]); bgX.strokeRect(x+1,y+1,w-2,h-2); bgX.setLineDash([]);
  bgX.font='11px DM Sans,sans-serif'; bgX.fillStyle='rgba(255,255,255,0.25)';
  bgX.textAlign='center'; bgX.textBaseline='middle';
  bgX.fillText('✦',x+w/2,y+h/2);
  toast('🪄 Ukryto! Teraz wstaw wirtualny mebel na to miejsce.');
}

// ── SCREENSHOT ────────────────────────────────
function screenshot(){
  const W=bgC.width,H=bgC.height;
  const out=document.createElement('canvas');
  out.width=W; out.height=H;
  const ctx=out.getContext('2d');
  ctx.drawImage(bgC,0,0);
  if(wallCol){ctx.globalAlpha=wallOp;ctx.fillStyle=wallCol;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  ctx.drawImage(oC,0,0);
  out.toBlob(blob=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='DesignAR_'+Date.now()+'.png';
    a.click();
    toast('📸 Projekt zapisany!');
  });
}

// ── TOAST ─────────────────────────────────────
let tT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('on');
  clearTimeout(tT); tT=setTimeout(()=>el.classList.remove('on'),2800);
}
</script>
</body>
</html>
